<!DOCTYPE html>
<html>
<head>
<title>UI Button Component</title>

<style>
.button {
  background-color: #4CAF50;
  border: none;
  color: white;
  padding: 12px 24px;
  font-size: 16px;
  cursor: pointer;
  border-radius: 5px;
}

.button:hover {
  background-color: #45a049;
}
</style>

</head>

<body>

<h2>Reusable Button Component</h2>

<button class="button">Primary Button</button>

</body>
</html>
