<!DOCTYPE html>
<html>
<head>
<title>Dashboard UI</title>

<style>
body{
font-family: Arial;
margin:0;
display:flex;
}

.sidebar{
width:200px;
background:#2c3e50;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
color:white;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
margin:15px 0;
}

.main{
flex:1;
padding:20px;
background:#f4f4f4;
}

.cards{
display:flex;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
flex:1;
text-align:center;
}
  .sidebar a{
color:white;
text-decoration:none;
}

.sidebar a:hover{
text-decoration:underline;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>Dashboard</h2>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Analytics</a></li>
<li><a href="#">Users</a></li>
<li><a href="#">Settings</a></li>
</ul>
</div>

<div class="main">
<h1>Dashboard Overview</h1>

<div class="cards">

<div class="card">
<h3>Users</h3>
<p>1200</p>
</div>

<div class="card">
<h3>Orders</h3>
<p>320</p>
</div>

<div class="card">
<h3>Revenue</h3>
<p>$12,500</p>
</div>

</div>

</div>

</body>
</html>
